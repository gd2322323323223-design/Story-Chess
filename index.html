<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>四素連萌：邏輯修復版</title>
    <style>
        :root { --t-color: #f1c40f; --p-color: #e91e63; --l-color: #2ecc71; --e-color: #3498db; }
        body { margin: 0; background: #0f172a; color: white; font-family: 'Microsoft JhengHei', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #header { text-align: center; margin-bottom: 25px; }
        #header h1 { font-size: 2.2rem; margin: 0 0 10px 0; letter-spacing: 5px; color: #fff; }

        .guide-container { display: flex; gap: 20px; font-size: 1.5rem; font-weight: bold; justify-content: center; align-items: center; }
        .guide-item { opacity: 0.2; transition: 0.3s; padding: 5px 15px; border-radius: 8px; }
        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--c); }
            50% { transform: scale(1.15); box-shadow: 0 0 30px var(--c); opacity: 1; }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--c); }
        }
        .guide-item.active { opacity: 1; animation: pulse-glow 1s infinite; background: rgba(255,255,255,0.1); }
        
        #game-grid { display: grid; grid-template-columns: repeat(4, 125px); grid-template-rows: repeat(4, 125px); gap: 15px; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 25px; }
        .tile { background: #1e293b; border: 2px solid #334155; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; transition: 0.2s; height: 125px; width: 125px; box-sizing: border-box; padding: 10px; line-height: 1.1; letter-spacing: 2px; text-align: center; }
        .tile.selected.T { background: var(--t-color); color: #000; border-color: #fff; }
        .tile.selected.P { background: var(--p-color); color: #000; border-color: #fff; }
        .tile.selected.L { background: var(--l-color); color: #000; border-color: #fff; }
        .tile.selected.E { background: var(--e-color); color: #000; border-color: #fff; }
        .tile.T { border-top: 8px solid var(--t-color); }
        .tile.P { border-top: 8px solid var(--p-color); }
        .tile.L { border-top: 8px solid var(--l-color); }
        .tile.E { border-top: 8px solid var(--e-color); }

        #feedback-area { margin-top: 20px; text-align: center; width: 80%; min-height: 160px; display: flex; flex-direction: column; align-items: center; }
        #sentence-bar { font-size: 2rem; font-weight: bold; margin-bottom: 10px; }
        #logic-hint { font-size: 1.3rem; padding: 12px 25px; border-radius: 12px; display: none; line-height: 1.4; max-width: 800px; }

        /* ✅ 新增：再試一次按鈕樣式 */
        #retry-btn {
            margin-top: 15px; display: none; padding: 12px 40px; font-size: 1.5rem; font-weight: 900;
            background: #ff4757; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4);
            transition: 0.3s; animation: popUp 0.3s ease-out;
        }
        #retry-btn:hover { transform: scale(1.1); background: #ff6b81; }
        @keyframes popUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #history-sidebar { width: 480px; background: rgba(15, 23, 42, 0.98); border-left: 2px solid #1e293b; padding: 35px; display: flex; flex-direction: column; }
        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .history-item { background: #1e293b; padding: 22px; border-radius: 18px; font-size: 1.4rem; font-weight: bold; border-left: 10px solid #334155; position: relative; }
        .history-item.pass { border-left-color: #2ecc71; }
        .history-item.fail { border-left-color: #e74c3c; background: rgba(231, 76, 60, 0.05); }
        .status-badge { position: absolute; top: 10px; right: 15px; font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; }

        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 80% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div id="game-area">
    <div id="header">
        <h1>四素連萌</h1>
        <div class="guide-container">
            <div class="guide-item" id="g-T" style="--c: var(--t-color); color: var(--t-color);">時間</div>
            <div style="opacity:0.2">→</div>
            <div class="guide-item" id="g-P" style="--c: var(--p-color); color: var(--p-color);">人物</div>
            <div style="opacity:0.2">→</div>
            <div class="guide-item" id="g-L" style="--c: var(--l-color); color: var(--l-color);">地點</div>
            <div style="opacity:0.2">→</div>
            <div class="guide-item" id="g-E" style="--c: var(--e-color); color: var(--e-color);">事情</div>
        </div>
    </div>
    <div id="game-grid"></div>
    <div id="feedback-area">
        <div id="sentence-bar">請點選「時間」</div>
        <div id="logic-hint"></div>
        <button id="retry-btn" onclick="retry()">再試一次 ↩</button>
    </div>
</div>

<div id="history-sidebar">
    <h3>📜 寫作反思日誌</h3>
    <div id="history-list"></div>
</div>

<script>
    const logicMap = {
        "在廚房": { can: ["煮麵", "洗碗", "吃早餐"], reason: "是用來煮食和用餐的地方。" },
        "在圖書館": { can: ["看書", "寫字", "溫習"], reason: "是需要保持安靜學習的地方。" },
        "在公園": { can: ["跑步", "玩耍", "散步"], reason: "是戶外運動和遊戲的地方。" },
        "在臥室": { can: ["睡覺", "換衣服", "做夢"], reason: "是休息和睡覺的地方。" }
    };

    const wordBank = {
        T: ["清晨", "中午", "放假", "深夜", "明早", "黃昏"],
        P: ["小狗", "媽媽", "老師", "弟弟", "小貓", "爸爸"],
        L: ["在廚房", "在圖書館", "在公園", "在臥室"],
        E: ["跑步", "煮麵", "看書", "睡覺", "寫字", "玩耍"]
    };

    let gridData = [], selectedIndices = [], sentenceCount = 0;
    const types = ["T", "P", "L", "E"];

    function initGame() {
        gridData = [];
        for (let i = 0; i < 4; i++) types.forEach(t => gridData.push({ text: getRand(t), type: t }));
        shuffle(gridData);
        render();
        updateGuide();
    }

    function getRand(type) { return wordBank[type][Math.floor(Math.random() * wordBank[type].length)]; }
    function shuffle(arr) { arr.sort(() => Math.random() - 0.5); }

    function render() {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        gridData.forEach((data, index) => {
            const div = document.createElement('div');
            div.className = `tile ${data.type} ${selectedIndices.includes(index) ? 'selected' : ''}`;
            div.innerText = data.text;
            div.style.fontSize = data.text.length > 3 ? "1.6rem" : (data.text.length === 3 ? "1.9rem" : "2.4rem");
            div.onclick = () => handleClick(index);
            grid.appendChild(div);
        });
    }

    function updateGuide() {
        const step = selectedIndices.length;
        document.querySelectorAll('.guide-item').forEach((el, idx) => el.classList.toggle('active', idx === step));
        if (step < 4) {
            document.getElementById('sentence-bar').innerText = `請選擇「${{T:"時間", P:"人物", L:"地點", E:"事情"}[types[step]]}」`;
            document.getElementById('sentence-bar').style.color = "#38bdf8";
        }
    }

    function handleClick(index) {
        if (selectedIndices.length >= 4 && !selectedIndices.includes(index)) return;
        if (selectedIndices.includes(index)) {
            if (index === selectedIndices[selectedIndices.length - 1]) {
                selectedIndices.pop();
                document.getElementById('retry-btn').style.display = "none";
                document.getElementById('logic-hint').style.display = "none";
                render(); updateGuide();
            }
            return;
        }
        if (gridData[index].type !== types[selectedIndices.length]) return;

        selectedIndices.push(index);
        render(); updateGuide();

        if (selectedIndices.length === 4) checkLogic();
    }

    function checkLogic() {
        const s = selectedIndices.map(i => gridData[i]);
        const loc = s[2].text;
        const act = s[3].text;
        const sentence = `${s[0].text}，${s[1].text}${loc}${act}。`;
        
        let isPass = logicMap[loc].can.includes(act);
        let hint = isPass ? "✨ 太棒了！邏輯非常合理。" : `🤔 想一想：${loc.replace("在","")}是用來${logicMap[loc].reason}在那裡「${act}」好像不合常理呢！`;

        sentenceCount++;
        const bar = document.getElementById('sentence-bar');
        const hintDiv = document.getElementById('logic-hint');
        const btn = document.getElementById('retry-btn');

        bar.innerText = sentence;
        bar.style.color = isPass ? "#2ecc71" : "#e74c3c";
        hintDiv.innerText = hint;
        hintDiv.style.display = "block";
        hintDiv.style.color = isPass ? "#2ecc71" : "#ff4757";

        if (!isPass) {
            btn.style.display = "block"; // ✅ 顯示再試一次按鈕
            document.getElementById('game-grid').classList.add('shake');
            setTimeout(() => document.getElementById('game-grid').classList.remove('shake'), 500);
        }

        addToHistory(sentence, isPass, hint);
        if (isPass) setTimeout(eliminate, 2500);
    }

    // ✅ 再試一次的邏輯
    function retry() {
        selectedIndices = []; // 清空選擇
        document.getElementById('retry-btn').style.display = "none";
        document.getElementById('logic-hint').style.display = "none";
        render();
        updateGuide();
    }

    function addToHistory(sentence, isPass, hint) {
        const list = document.getElementById('history-list');
        const item = document.createElement('div');
        item.className = `history-item ${isPass ? 'pass' : 'fail'}`;
        item.innerHTML = `<span class="status-badge" style="background:${isPass?'#2ecc71':'#e74c3c'}">${isPass?'選輯正確':'邏輯待考'}</span>${sentenceCount}. ${sentence}<div style="font-size: 1rem; color: #94a3b8; margin-top: 8px; font-weight: normal;">${hint}</div>`;
        list.appendChild(item);
        list.scrollTop = list.scrollHeight;
    }

    function eliminate() {
        selectedIndices.forEach(idx => gridData[idx] = { text: getRand(gridData[idx].type), type: gridData[idx].type });
        selectedIndices = [];
        document.getElementById('logic-hint').style.display = "none";
        render(); updateGuide();
    }

    initGame();
</script>
</body>
</html>
