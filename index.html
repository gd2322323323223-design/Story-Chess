<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>四素連萌：大字優化版</title>
    <style>
        :root { --t-color: #f1c40f; --p-color: #e91e63; --l-color: #2ecc71; --e-color: #3498db; }
        
        body { 
            margin: 0; background: #0f172a; color: white; 
            font-family: 'Microsoft JhengHei', 'Heiti TC', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        #game-area { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
        }

        #header { text-align: center; margin-bottom: 25px; }
        
        .guide-container { display: flex; gap: 20px; margin-top: 15px; font-size: 1.3rem; font-weight: bold; }
        .guide-item { opacity: 0.2; transition: 0.3s; padding: 5px 15px; border-radius: 8px; }
        
        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--c); }
            50% { transform: scale(1.1); box-shadow: 0 0 25px var(--c); opacity: 1; }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--c); }
        }
        .guide-item.active { opacity: 1; animation: pulse-glow 1s infinite; background: rgba(255,255,255,0.1); }

        /* 棋盤佈局 */
        #game-grid { 
            display: grid; grid-template-columns: repeat(4, 120px); 
            grid-template-rows: repeat(4, 120px); gap: 15px; 
            background: rgba(255,255,255,0.03); padding: 25px; border-radius: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
        }

        /* 詞語方格優化 */
        .tile { 
            background: #1e293b; border: 2px solid #334155; border-radius: 18px;
            display: flex; align-items: center; justify-content: center; 
            /* 調整：字體再次放大，加入 letter-spacing 增加呼吸感 */
            font-size: 1.8rem; font-weight: 900; cursor: pointer; transition: 0.2s;
            user-select: none; color: #ffffff; text-align: center;
            height: 120px; width: 120px; box-sizing: border-box;
            padding: 5px; line-height: 1.1; letter-spacing: 2px;
            word-break: break-all;
        }

        .tile.selected { transform: scale(1.08); border-color: #fff; z-index: 10; box-shadow: 0 0 25px rgba(255,255,255,0.5); }
        .tile.selected.T { background: var(--t-color); color: #000; }
        .tile.selected.P { background: var(--p-color); color: #000; }
        .tile.selected.L { background: var(--l-color); color: #000; }
        .tile.selected.E { background: var(--e-color); color: #000; }

        .tile.T { border-top: 8px solid var(--t-color); }
        .tile.P { border-top: 8px solid var(--p-color); }
        .tile.L { border-top: 8px solid var(--l-color); }
        .tile.E { border-top: 8px solid var(--e-color); }
        
        .pop-out { transform: scale(0); opacity: 0; transition: 0.4s; }

        #sentence-bar { margin-top: 40px; min-height: 60px; color: #38bdf8; font-size: 1.8rem; font-weight: bold; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }

        /* 右側日誌區 */
        #history-sidebar {
            width: 400px; background: rgba(15, 23, 42, 0.98);
            border-left: 2px solid #1e293b; display: flex; flex-direction: column;
            padding: 30px; box-sizing: border-box;
        }
        #history-sidebar h3 { margin: 0 0 20px 0; font-size: 1.3rem; color: #38bdf8; display: flex; align-items: center; gap: 10px; }
        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .history-item { 
            background: #1e293b; padding: 18px; border-radius: 15px;
            font-size: 1.1rem; border-left: 6px solid var(--t-color); 
            animation: slideIn 0.4s ease-out; color: #f1f5f9; line-height: 1.6;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        #history-list::-webkit-scrollbar { width: 6px; }
        #history-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-area">
    <div id="header">
        <h1 style="margin:0; font-size: 2.2rem; letter-spacing: 3px;">四素連萌：智慧造句</h1>
        <div class="guide-container">
            <div class="guide-item" id="g-T" style="--c: var(--t-color); color: var(--t-color);">時間</div>
            <div style="opacity:0.2">→</div>
            <div class="guide-item" id="g-P" style="--c: var(--p-color); color: var(--p-color);">人物</div>
            <div style="opacity:0.2">→</div>
            <div class="guide-item" id="g-L" style="--c: var(--l-color); color: var(--l-color);">地點</div>
            <div style="opacity:0.2">→</div>
            <div class="guide-item" id="g-E" style="--c: var(--e-color); color: var(--e-color);">事情</div>
        </div>
    </div>

    <div id="game-grid"></div>
    <div id="sentence-bar">請點選「時間」詞語開始</div>
</div>

<div id="history-sidebar">
    <h3>📜 寫作日誌 (最新紀錄)</h3>
    <div id="history-list"></div>
</div>

<script>
    const grid = document.getElementById('game-grid');
    const sentenceBar = document.getElementById('sentence-bar');
    const historyList = document.getElementById('history-list');
    const types = ["T", "P", "L", "E"];
    const typeNames = ["時間", "人物", "地點", "事情"];

    const wordBank = {
        T: ["清晨", "中午", "放假", "深夜", "明早", "黃昏", "今天", "週末"],
        P: ["小狗", "媽媽", "老師", "弟弟", "小貓", "爸爸", "妹妹", "姐姐"],
        L: ["公園", "廚房", "海邊", "課室", "花園", "浴室", "圖書館", "超市"],
        E: ["跑步", "煮麵", "看書", "玩耍", "跳舞", "唱歌", "畫畫", "散步"]
    };

    let gridData = [];
    let selectedIndices = [];
    let sentencesHistory = [];
    let sentenceCount = 0;

    function initGame() {
        gridData = [];
        for (let i = 0; i < 4; i++) {
            types.forEach(t => gridData.push(generateRandomWord(t)));
        }
        shuffle(gridData);
        render();
        updateGuide();
    }

    function generateRandomWord(type) {
        const words = wordBank[type];
        const text = words[Math.floor(Math.random() * words.length)];
        return { text: type === "L" ? "在" + text : text, type: type };
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function render() {
        grid.innerHTML = '';
        gridData.forEach((data, index) => {
            const div = document.createElement('div');
            div.className = `tile ${data.type}`;
            if (selectedIndices.includes(index)) div.classList.add('selected');
            
            // 根據字數微調字體大小，確保呼吸感
            if (data.text.length > 3) {
                div.style.fontSize = "1.5rem";
            } else if (data.text.length === 3) {
                div.style.fontSize = "1.7rem";
            } else {
                div.style.fontSize = "2.1rem";
            }

            div.innerText = data.text;
            div.onclick = () => handleClick(index);
            grid.appendChild(div);
        });
    }

    function updateGuide() {
        const nextIdx = selectedIndices.length;
        document.querySelectorAll('.guide-item').forEach((el, idx) => {
            el.classList.toggle('active', idx === nextIdx);
        });
    }

    function handleClick(index) {
        if (selectedIndices.length >= 4 && !selectedIndices.includes(index)) return;
        const clickedWord = gridData[index];
        const neededType = types[selectedIndices.length];

        if (selectedIndices.includes(index)) {
            if (index === selectedIndices[selectedIndices.length - 1]) {
                selectedIndices.pop();
                sentenceBar.innerText = selectedIndices.length === 0 ? "請點選「時間」詞語" : "繼續組合句子...";
                render(); updateGuide();
            }
            return;
        }

        if (clickedWord.type !== neededType) {
            sentenceBar.style.color = "#ff4757";
            sentenceBar.innerText = `需按順序！請找「${typeNames[selectedIndices.length]}」`;
            setTimeout(() => { sentenceBar.style.color = "#38bdf8"; }, 1000);
            return;
        }

        selectedIndices.push(index);
        render(); updateGuide();

        if (selectedIndices.length === 4) {
            const t = gridData[selectedIndices[0]].text;
            const p = gridData[selectedIndices[1]].text;
            const l = gridData[selectedIndices[2]].text;
            const e = gridData[selectedIndices[3]].text;
            const fullSentence = `${t}，${p}${l}${e}。`;
            sentenceBar.innerText = "✨ " + fullSentence;
            addHistory(fullSentence);
            setTimeout(eliminate, 800);
        }
    }

    function addHistory(text) {
        sentenceCount++;
        sentencesHistory.unshift(`${sentenceCount}. ${text}`);
        if (sentencesHistory.length > 10) sentencesHistory.pop();
        
        historyList.innerHTML = '';
        sentencesHistory.forEach(s => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = s;
            historyList.appendChild(item);
        });
    }

    function eliminate() {
        const tiles = document.querySelectorAll('.tile');
        selectedIndices.forEach(idx => tiles[idx].classList.add('pop-out'));
        setTimeout(() => {
            selectedIndices.forEach(idx => {
                gridData[idx] = generateRandomWord(gridData[idx].type);
            });
            selectedIndices = [];
            render(); updateGuide();
            sentenceBar.innerText = "做得好！新詞語已掉落";
        }, 400);
    }

    initGame();
</script>
</body>
</html>
