<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>四素連萌：精準引導版</title>
    <style>
        :root { --t-color: #f1c40f; --p-color: #e91e63; --l-color: #2ecc71; --e-color: #3498db; }
        body { margin: 0; background: #0f172a; color: white; font-family: 'Microsoft JhengHei', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #game-grid { display: grid; grid-template-columns: repeat(4, 125px); grid-template-rows: repeat(4, 125px); gap: 15px; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 25px; }
        
        /* 大字方格 */
        .tile { background: #1e293b; border: 2px solid #334155; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; transition: 0.2s; height: 125px; width: 125px; box-sizing: border-box; padding: 8px; letter-spacing: 2px; text-align: center; }
        .tile.selected.T { background: var(--t-color); color: #000; }
        .tile.selected.P { background: var(--p-color); color: #000; }
        .tile.selected.L { background: var(--l-color); color: #000; }
        .tile.selected.E { background: var(--e-color); color: #000; }
        .tile.T { border-top: 8px solid var(--t-color); }
        .tile.P { border-top: 8px solid var(--p-color); }
        .tile.L { border-top: 8px solid var(--l-color); }
        .tile.E { border-top: 8px solid var(--e-color); }

        /* 提示區域 */
        #sentence-bar { margin-top: 30px; min-height: 80px; font-size: 1.8rem; font-weight: bold; text-align: center; }
        .logic-feedback { font-size: 1.3rem; color: #ff4757; margin-top: 10px; background: rgba(255, 71, 87, 0.1); padding: 10px 20px; border-radius: 10px; display: none; }

        /* 右側日誌 */
        #history-sidebar { width: 450px; background: rgba(15, 23, 42, 0.98); border-left: 2px solid #1e293b; padding: 35px; display: flex; flex-direction: column; }
        .history-item { background: #1e293b; padding: 20px; border-radius: 18px; font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; position: relative; border-left: 8px solid #334155; }
        .history-item.pass { border-left-color: #2ecc71; }
        .history-item.fail { border-left-color: #e74c3c; opacity: 0.8; }
        .status-tag { font-size: 0.8rem; position: absolute; top: 10px; right: 15px; padding: 3px 8px; border-radius: 5px; }
        .status-tag.pass { background: #2ecc71; }
        .status-tag.fail { background: #e74c3c; }

        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div id="game-area">
    <div id="header" style="text-align: center; margin-bottom: 20px;">
        <h1>四素連萌：邏輯思考</h1>
    </div>
    <div id="game-grid"></div>
    <div id="sentence-bar">請點選「時間」詞語</div>
    <div id="logic-feedback" class="logic-feedback"></div>
</div>

<div id="history-sidebar">
    <h3>📜 寫作與思考日誌</h3>
    <div id="history-list"></div>
</div>

<script>
    // 擴展語意庫：加入理由（reason）
    const logicMap = {
        "在廚房": { 
            can: ["煮麵", "吃早餐", "洗碗"], 
            reason: "廚房是用來準備食物的地方。" 
        },
        "在圖書館": { 
            can: ["看書", "寫字", "溫習"], 
            reason: "圖書館需要保持安靜，適合閱讀。" 
        },
        "在公園": { 
            can: ["跑步", "玩耍", "散步", "跳繩"], 
            reason: "公園是戶外活動的好地方。" 
        },
        "在臥室": { 
            can: ["睡覺", "換衣服"], 
            reason: "臥室是私人休息的地方。" 
        }
    };

    const wordBank = {
        T: ["清晨", "中午", "放假", "深夜", "明早", "黃昏"],
        P: ["小狗", "媽媽", "老師", "弟弟", "小貓", "爸爸"],
        L: ["在廚房", "在圖書館", "在公園", "在臥室"],
        E: ["跑步", "煮麵", "看書", "睡覺", "寫字", "玩耍"]
    };

    let gridData = [], selectedIndices = [], sentenceCount = 0;
    const types = ["T", "P", "L", "E"];

    function initGame() {
        gridData = [];
        for (let i = 0; i < 4; i++) types.forEach(t => gridData.push({ text: generateText(t), type: t }));
        shuffle(gridData);
        render();
    }

    function generateText(type) {
        const pool = wordBank[type];
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function shuffle(array) { array.sort(() => Math.random() - 0.5); }

    function render() {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        gridData.forEach((data, index) => {
            const div = document.createElement('div');
            div.className = `tile ${data.type} ${selectedIndices.includes(index) ? 'selected' : ''}`;
            div.innerText = data.text;
            div.style.fontSize = data.text.length > 3 ? "1.6rem" : "2.2rem";
            div.onclick = () => handleClick(index);
            grid.appendChild(div);
        });
    }

    function handleClick(index) {
        if (selectedIndices.includes(index)) {
            if (index === selectedIndices[selectedIndices.length-1]) selectedIndices.pop();
            hideFeedback();
            render(); return;
        }
        if (gridData[index].type !== types[selectedIndices.length]) return;

        selectedIndices.push(index);
        hideFeedback();
        render();

        if (selectedIndices.length === 4) {
            processSentence();
        }
    }

    function processSentence() {
        const s = selectedIndices.map(i => gridData[i]);
        const loc = s[2].text;
        const act = s[3].text;
        const fullSentence = `${s[0].text}，${s[1].text}${loc}${act}。`;
        
        let isPass = false;
        let feedback = "";

        // 精準邏輯檢查
        if (logicMap[loc]) {
            if (logicMap[loc].can.includes(act)) {
                isPass = true;
                feedback = "✨ 完美的句子！邏輯非常合理。";
            } else {
                isPass = false;
                feedback = `🤔 想一想：${loc.replace("在","")}是${logicMap[loc].reason}在那裡「${act}」好像不太合適呢！`;
            }
        }

        sentenceCount++;
        showResult(fullSentence, isPass, feedback);
    }

    function showResult(sentence, isPass, feedback) {
        const bar = document.getElementById('sentence-bar');
        const fbDiv = document.getElementById('logic-feedback');
        
        bar.innerText = sentence;
        bar.style.color = isPass ? "#2ecc71" : "#e74c3c";
        
        fbDiv.innerText = feedback;
        fbDiv.style.display = "block";
        fbDiv.style.color = isPass ? "#2ecc71" : "#ff4757";

        if (!isPass) {
            document.getElementById('game-grid').classList.add('shake');
            setTimeout(() => document.getElementById('game-grid').classList.remove('shake'), 500);
        }

        addHistory(sentence, isPass, feedback);
        
        // 如果正確則消除，如果錯誤則留著讓學生看清楚，3秒後才重置或讓學生自己點擊取消
        if (isPass) {
            setTimeout(eliminate, 2000);
        } else {
            // 錯誤時不自動消除，讓老師可以講解，或者讓學生自己取消最後一項
        }
    }

    function addHistory(text, isPass, feedback) {
        const item = document.createElement('div');
        item.className = `history-item ${isPass ? 'pass' : 'fail'}`;
        item.innerHTML = `
            <span class="status-tag ${isPass ? 'pass' : 'fail'}">${isPass ? '邏輯正確' : '需要思考'}</span>
            ${sentenceCount}. ${text}
            <div style="font-size: 0.9rem; margin-top: 5px; color: #94a3b8;">${feedback}</div>
        `;
        const list = document.getElementById('history-list');
        list.insertBefore(item, list.firstChild);
    }

    function hideFeedback() {
        document.getElementById('logic-feedback').style.display = "none";
        document.getElementById('sentence-bar').style.color = "#38bdf8";
        if(selectedIndices.length === 0) document.getElementById('sentence-bar').innerText = "請點選「時間」詞語";
    }

    function eliminate() {
        selectedIndices.forEach(idx => gridData[idx] = { text: generateText(gridData[idx].type), type: gridData[idx].type });
        selectedIndices = [];
        hideFeedback();
        render();
    }

    initGame();
</script>
</body>
</html>
