<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詞語領土爭奪戰：AI 魔法對決</title>
    <style>
        :root {
            --p1-color: #3182ce;
            --p2-color: #d53f8c;
            --bg-transition: 1.5s;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        /* --- 魔法背景控制 --- */
        #magic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('images/default-bg.jpg') no-repeat center center/cover;
            z-index: -1;
            transition: all var(--bg-transition) ease;
        }

        /* 背景變色濾鏡 */
        .magic-night { filter: brightness(0.4) contrast(1.2) hue-rotate(240deg); }
        .magic-morning { filter: sepia(0.2) brightness(1.1); }
        .magic-park { background-image: url('images/park-bg.jpg') !important; }

        /* --- 頂部戰況欄 --- */
        #scoreboard {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .player-box { padding: 10px 20px; border-radius: 15px; color: white; font-weight: bold; font-size: 1.5rem; }
        #p1-box { background: var(--p1-color); border: 4px solid gold; }
        #p2-box { background: var(--p2-color); border: 4px solid transparent; }
        #p1-box.active { box-shadow: 0 0 20px var(--p1-color); border-color: white; }
        #p2-box.active { box-shadow: 0 0 20px var(--p2-color); border-color: white; }

        #ai-assistant {
            text-align: center; max-width: 40%;
            background: white; padding: 10px; border-radius: 20px;
            border: 2px solid #555; position: relative;
        }

        /* --- 領土矩陣 --- */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(5, 120px);
            grid-gap: 15px;
            justify-content: center;
            align-content: center;
            height: 80vh;
        }

        .cell {
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid #ddd; border-radius: 15px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; transition: transform 0.2s, background 0.5s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .cell:hover { transform: scale(1.05); background: white; }
        .cell.p1-owned { background: var(--p1-color); color: white; border-color: gold; transform: rotate(5deg); }
        .cell.p2-owned { background: var(--p2-color); color: white; border-color: gold; transform: rotate(-5deg); }

        /* --- 任務彈窗 --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }

        #modal {
            background: white; padding: 30px; border-radius: 30px;
            width: 80%; max-width: 800px; text-align: center;
        }

        #task-gif { width: 100%; max-height: 300px; border-radius: 15px; object-fit: contain; }

        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .word-btn {
            padding: 10px 20px; background: #f0f0f0; border: 2px solid #ccc;
            border-radius: 10px; cursor: pointer; font-size: 1.2rem;
        }
        .word-btn.selected { background: #ffeb3b; border-color: #fbc02d; }

        #sentence-bar {
            margin: 20px 0; padding: 15px; background: #eee;
            border-radius: 10px; font-size: 1.5rem; min-height: 1.5rem;
        }

        .action-btn {
            padding: 15px 40px; font-size: 1.5rem; background: #4caf50;
            color: white; border: none; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="magic-bg"></div>

    <div id="scoreboard">
        <div id="p1-box" class="player-box active">藍隊 👑 <span id="p1-score">0</span></div>
        <div id="ai-assistant">
            <div id="ai-text">「大家好！我是 AI 助教，點擊格子開始佔領吧！」</div>
        </div>
        <div id="p2-box" class="player-box">紅隊 <span id="p2-score">0</span></div>
    </div>

    <div id="grid-container"></div>

    <div id="modal-overlay">
        <div id="modal">
            <img id="task-gif" src="" alt="任務目標">
            <div id="sentence-bar">請點選詞語...</div>
            <div class="word-bank" id="word-bank"></div>
            <br>
            <button class="action-btn" onclick="submitTask()">佔領這塊地！</button>
        </div>
    </div>

<script>
    // 1. 初始化任務數據 (你可以填滿 25-35 個)
    const tasks = [
        { gif: "jogging.gif", validP: ["爸爸", "哥哥", "弟弟"], validT: ["早上", "清晨"], validL: ["在公園"], validE: ["跑步"] },
        { gif: "cooking.gif", validP: ["媽媽", "奶奶"], validT: ["今天", "中午"], validL: ["在廚房"], validE: ["煮飯"] },
        { gif: "night_sleep.gif", validP: ["姐姐", "妹妹"], validT: ["晚上", "昨晚"], validL: ["在房間"], validE: ["睡覺"] },
        // ... 此處加入更多任務
    ];

    const wordBank = {
        T: ["早上", "中午", "晚上", "昨晚", "今天", "清晨"],
        P: ["爸爸", "媽媽", "哥哥", "姐姐", "弟弟", "奶奶"],
        L: ["在公園", "在廚房", "在房間", "在操場"],
        E: ["跑步", "煮飯", "睡覺", "看書"]
    };

    let currentPlayer = 1;
    let scores = { 1: 0, 2: 0 };
    let currentTaskIndex = null;
    let selectedWords = { T: "", P: "", L: "", E: "" };

    // 2. 生成 5x5 地圖
    const grid = document.getElementById('grid-container');
    for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerText = i + 1;
        cell.onclick = () => startTask(i);
        grid.appendChild(cell);
    }

    // 3. 開始挑戰
    function startTask(index) {
        currentTaskIndex = index;
        selectedWords = { T: "", P: "", L: "", E: "" };
        updateSentenceBar();
        
        // 隨機選一個任務 GIF
        const randomTask = tasks[Math.floor(Math.random() * tasks.length)];
        document.getElementById('task-gif').src = "images/" + randomTask.gif;
        document.getElementById('task-gif').dataset.validJson = JSON.stringify(randomTask);
        
        renderWordBank();
        document.getElementById('modal-overlay').style.display = 'flex';
        aiSay("請觀察圖片，拼出正確的四素句！");
    }

    function renderWordBank() {
        const container = document.getElementById('word-bank');
        container.innerHTML = "";
        ["T", "P", "L", "E"].forEach(type => {
            wordBank[type].forEach(word => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.innerText = word;
                btn.onclick = () => selectWord(type, word, btn);
                container.appendChild(btn);
            });
        });
    }

    function selectWord(type, word, btn) {
        selectedWords[type] = word;
        updateSentenceBar();
        // 視覺反饋
        const btns = btn.parentNode.getElementsByClassName('word-btn');
        for(let b of btns) b.classList.remove('selected');
        btn.classList.add('selected');
    }

    function updateSentenceBar() {
        const { T, P, L, E } = selectedWords;
        document.getElementById('sentence-bar').innerText = `${T}，${P}${L}${E}。`;
    }

    // 4. 提交與 AI 魔法判定
    function submitTask() {
        const validData = JSON.parse(document.getElementById('task-gif').dataset.validJson);
        const { T, P, L, E } = selectedWords;

        const isCorrect = validData.validT.includes(T) && 
                          validData.validP.includes(P) && 
                          validData.validL.includes(L) && 
                          validData.validE.includes(E);

        if (isCorrect) {
            handleSuccess(T);
        } else {
            aiSay("哎呀，好像不太對，再仔細觀察一下圖中發生了什麼？");
        }
    }

    function handleSuccess(timeWord) {
        const overlay = document.getElementById('modal-overlay');
        overlay.style.display = 'none';

        // 佔領格子
        const cells = document.getElementsByClassName('cell');
        const targetCell = cells[currentTaskIndex];
        targetCell.classList.add(currentPlayer === 1 ? 'p1-owned' : 'p2-owned');
        targetCell.innerText = currentPlayer === 1 ? "藍" : "紅";
        targetCell.onclick = null; // 不能重複佔領

        scores[currentPlayer]++;
        updateScoreboard();

        // --- 極致加強：AI 環境魔法 ---
        const bg = document.body;
        bg.className = ""; // 清除舊魔法
        if (timeWord === "晚上" || timeWord === "昨晚") {
            bg.classList.add('magic-night');
            aiSay("太厲害了！你佔領了這塊地！現在進入黑夜模式...");
        } else if (timeWord === "早上" || timeWord === "清晨") {
            bg.classList.add('magic-morning');
            aiSay("早安！這塊地現在屬於你的了！");
        } else {
            aiSay("漂亮！這是一個完美的句子！");
        }

        // 切換玩家
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        document.getElementById('p1-box').classList.toggle('active');
        document.getElementById('p2-box').classList.toggle('active');
    }

    function updateScoreboard() {
        document.getElementById('p1-score').innerText = scores[1];
        document.getElementById('p2-score').innerText = scores[2];
    }

    function aiSay(text) {
        document.getElementById('ai-text').innerText = text;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-HK';
        window.speechSynthesis.speak(msg);
    }

    function checkWinner() {
        // 這裡可以加入檢查 25 格是否滿了的邏輯
    }
</script>
</body>
</html>
