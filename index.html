<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>еӣӣзҙ йҖЈиҗҢпјҡеҜ«дҪңзҙҖйҢ„зүҲ</title>
    <style>
        :root { --t-color: #f1c40f; --p-color: #e91e63; --l-color: #2ecc71; --e-color: #3498db; }
        body { margin: 0; background: #0f172a; color: white; font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; overflow: hidden; }
        
        #header { text-align: center; margin-bottom: 20px; }
        .guide-container { display: flex; gap: 15px; margin-top: 10px; font-size: 1.1rem; font-weight: bold; justify-content: center; }
        .guide-item { opacity: 0.3; transition: 0.3s; padding: 5px 10px; border-radius: 5px; }
        
        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--c); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px var(--c); opacity: 1; }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--c); }
        }
        .guide-item.active { opacity: 1; animation: pulse-glow 1s infinite; background: rgba(255,255,255,0.1); }

        #main-container { display: flex; gap: 30px; align-items: flex-start; }

        /* е·ҰеҒҙпјҡжЈӢзӣӨ */
        #game-grid { 
            display: grid; grid-template-columns: repeat(4, 80px); 
            grid-template-rows: repeat(4, 80px); gap: 10px; 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* еҸіеҒҙпјҡзҙҖйҢ„жЎҶе„ӘеҢ– */
        #history-panel {
            width: 320px; height: 350px; background: rgba(0,0,0,0.3);
            border-radius: 15px; border: 1px solid #334155;
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
        }
        #history-panel h3 { margin: 0 0 10px 0; font-size: 1rem; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        
        #history-list { 
            flex: 1; overflow-y: auto; 
            display: flex; flex-direction: column; /* жӯЈеёёеҫһдёҠеҫҖдёӢжҺ’ */
            gap: 8px; 
        }
        
        .history-item { 
            background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px;
            font-size: 0.9rem; border-left: 4px solid var(--t-color); 
            animation: slideIn 0.3s ease-out; color: #e2e8f0;
            line-height: 1.4;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .tile { 
            background: #1e293b; border: 2px solid #334155; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.95rem; cursor: pointer; transition: 0.2s;
            user-select: none; color: #cbd5e1; text-align: center;
            height: 80px; width: 80px; box-sizing: border-box;
        }

        .tile.selected { transform: scale(1.05); color: #fff; border-color: #fff; z-index: 10; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .tile.selected.T { background: var(--t-color); color: #000; }
        .tile.selected.P { background: var(--p-color); color: #000; }
        .tile.selected.L { background: var(--l-color); color: #000; }
        .tile.selected.E { background: var(--e-color); color: #000; }

        .tile.T { border-top: 5px solid var(--t-color); }
        .tile.P { border-top: 5px solid var(--p-color); }
        .tile.L { border-top: 5px solid var(--l-color); }
        .tile.E { border-top: 5px solid var(--e-color); }
        .pop-out { transform: scale(0); opacity: 0; transition: 0.3s; }

        #sentence-bar { margin-top: 25px; min-height: 40px; color: #38bdf8; font-size: 1.1rem; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="header">
    <h2 style="margin:0;">еӣӣзҙ йҖЈиҗҢпјҡеүөж„ҸеҜ«дҪң</h2>
    <div class="guide-container">
        <div class="guide-item" id="g-T" style="--c: var(--t-color); color: var(--t-color);">жҷӮй–“</div>
        <div style="opacity:0.3">вҶ’</div>
        <div class="guide-item" id="g-P" style="--c: var(--p-color); color: var(--p-color);">дәәзү©</div>
        <div style="opacity:0.3">вҶ’</div>
        <div class="guide-item" id="g-L" style="--c: var(--l-color); color: var(--l-color);">ең°й»һ</div>
        <div style="opacity:0.3">вҶ’</div>
        <div class="guide-item" id="g-E" style="--c: var(--e-color); color: var(--e-color);">дәӢжғ…</div>
    </div>
</div>

<div id="main-container">
    <div id="game-grid"></div>
    <div id="history-panel">
        <h3>рҹ“ң еҜ«дҪңж—ҘиӘҢ (зҪ®й ӮжңҖж–°)</h3>
        <div id="history-list"></div>
    </div>
</div>

<div id="sentence-bar">и«Ӣй»һйҒёгҖҢжҷӮй–“гҖҚи©һиӘһ</div>

<script>
    const grid = document.getElementById('game-grid');
    const sentenceBar = document.getElementById('sentence-bar');
    const historyList = document.getElementById('history-list');
    const types = ["T", "P", "L", "E"];
    const typeNames = ["жҷӮй–“", "дәәзү©", "ең°й»һ", "дәӢжғ…"];

    const wordBank = {
        T: ["жё…жҷЁ", "дёӯеҚҲ", "ж”ҫеҒҮ", "ж·ұеӨң", "жҳҺж—©", "й»ғжҳҸ", "д»ҠеӨ©", "йҖұжң«"],
        P: ["е°ҸзӢ—", "еӘҪеӘҪ", "иҖҒеё«", "ејҹејҹ", "е°ҸиІ“", "зҲёзҲё", "еҰ№еҰ№", "е§җе§җ"],
        L: ["е…¬ең’", "е»ҡжҲҝ", "жө·йӮҠ", "иӘІе®Ө", "иҠұең’", "жөҙе®Ө", "ең–жӣёйӨЁ", "и¶…еёӮ"],
        E: ["и·‘жӯҘ", "з…®йәө", "зңӢжӣё", "зҺ©иҖҚ", "и·іиҲһ", "е”ұжӯҢ", "з•«з•«", "ж•ЈжӯҘ"]
    };

    let gridData = [];
    let selectedIndices = [];
    let sentencesHistory = [];
    let sentenceCount = 0; // еҸҘеӯҗз·ЁиҷҹиЁҲж•ёеҷЁ

    function initGame() {
        gridData = [];
        for (let i = 0; i < 4; i++) {
            types.forEach(t => gridData.push(generateRandomWord(t)));
        }
        shuffle(gridData);
        render();
        updateGuide();
    }

    function generateRandomWord(type) {
        const words = wordBank[type];
        const text = words[Math.floor(Math.random() * words.length)];
        return { text: type === "L" ? "еңЁ" + text : text, type: type };
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function render() {
        grid.innerHTML = '';
        gridData.forEach((data, index) => {
            const div = document.createElement('div');
            div.className = `tile ${data.type}`;
            if (selectedIndices.includes(index)) div.classList.add('selected');
            div.innerText = data.text;
            div.onclick = () => handleClick(index);
            grid.appendChild(div);
        });
    }

    function updateGuide() {
        const nextIdx = selectedIndices.length;
        document.querySelectorAll('.guide-item').forEach((el, idx) => {
            el.classList.toggle('active', idx === nextIdx);
        });
    }

    function handleClick(index) {
        if (selectedIndices.length >= 4 && !selectedIndices.includes(index)) return;
        const clickedWord = gridData[index];
        const neededType = types[selectedIndices.length];

        if (selectedIndices.includes(index)) {
            if (index === selectedIndices[selectedIndices.length - 1]) {
                selectedIndices.pop();
                sentenceBar.innerText = selectedIndices.length === 0 ? "и«Ӣй»һйҒёгҖҢжҷӮй–“гҖҚи©һиӘһ" : "з№јзәҢзө„еҗҲеҸҘеӯҗ...";
                render(); updateGuide();
            }
            return;
        }

        if (clickedWord.type !== neededType) {
            sentenceBar.style.color = "#ff4757";
            sentenceBar.innerText = `й ҶеәҸпјҡжҷӮвҶ’дәәвҶ’ең°вҶ’дәӢгҖӮи«ӢжүҫгҖҢ${typeNames[selectedIndices.length]}гҖҚ`;
            setTimeout(() => { sentenceBar.style.color = "#38bdf8"; }, 1000);
            return;
        }

        selectedIndices.push(index);
        render(); updateGuide();

        if (selectedIndices.length === 4) {
            // ж јејҸеҢ–еҸҘеӯҗпјҡжҷӮй–“ + йҖ—иҷҹ + дәәзү© + ең°й»һ + дәӢжғ… + еҸҘиҷҹ
            const t = gridData[selectedIndices[0]].text;
            const p = gridData[selectedIndices[1]].text;
            const l = gridData[selectedIndices[2]].text;
            const e = gridData[selectedIndices[3]].text;
            
            const fullSentence = `${t}пјҢ${p}${l}${e}гҖӮ`;
            sentenceBar.innerText = "вңЁ " + fullSentence;
            addHistory(fullSentence);
            setTimeout(eliminate, 800);
        }
    }

    function addHistory(text) {
        sentenceCount++;
        const formattedText = `${sentenceCount}. ${text}`;
        
        // е°Үж–°еҸҘеӯҗеҠ е…ҘйҷЈеҲ—й–Ӣй ӯ (Unshift)
        sentencesHistory.unshift(formattedText);
        if (sentencesHistory.length > 10) sentencesHistory.pop();
        
        historyList.innerHTML = '';
        sentencesHistory.forEach(s => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = s;
            historyList.appendChild(item);
        });
    }

    function eliminate() {
        const tiles = document.querySelectorAll('.tile');
        selectedIndices.forEach(idx => tiles[idx].classList.add('pop-out'));
        setTimeout(() => {
            selectedIndices.forEach(idx => {
                gridData[idx] = generateRandomWord(gridData[idx].type);
            });
            selectedIndices = [];
            render(); updateGuide();
            sentenceBar.innerText = "е®ҢжҲҗпјҒеҫ—еҲ°йЈјж–ҷ +1";
        }, 300);
    }

    initGame();
</script>
</body>
</html>
