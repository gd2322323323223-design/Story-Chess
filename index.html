<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>AI 生態缸：物質重構實驗</title>
    <style>
        :root {
            --primary: #00f2fe; --accent: #4facfe;
            --radius: 50%; --morph: 30% 70% 70% 30% / 30% 30% 70% 70%;
            --blur: 10px; --rotation: 0deg;
        }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        /* 核心生態缸：多層濾鏡疊加產生液態感 */
        .stage { position: relative; filter: contrast(20) hue-rotate(var(--rotation)); }
        
        #eco-sphere {
            width: 300px; height: 300px;
            background: var(--primary);
            border-radius: var(--morph);
            filter: blur(var(--blur));
            box-shadow: 0 0 50px var(--accent);
            transition: all 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: rotate 20s infinite linear;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 裝飾性光環 */
        .ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; height: 350px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; pointer-events: none;
        }

        /* 控制台 */
        .panel { 
            position: absolute; bottom: 50px; background: rgba(255,255,255,0.1);
            padding: 20px; border-radius: 20px; backdrop-filter: blur(20px);
            display: grid; grid-template-columns: repeat(2, 180px); gap: 10px;
        }
        input { background: #000; border: 1px solid #444; padding: 10px; color: #fff; border-radius: 8px; }
        button { grid-column: span 2; padding: 15px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #narrative { position: absolute; top: 80px; width: 400px; text-align: center; font-size: 1.2em; color: var(--primary); }
    </style>
</head>
<body>

    <div id="narrative">你好，觀察者。請輸入語意配方，改變物質狀態。</div>

    <div class="stage">
        <div id="eco-sphere"></div>
    </div>
    <div class="ring"></div>

    <div class="panel">
        <input type="text" id="t" placeholder="時間">
        <input type="text" id="p" placeholder="人物">
        <input type="text" id="l" placeholder="地點">
        <input type="text" id="e" placeholder="事件">
        <button onclick="transform()">🧪 啟動物質重構</button>
    </div>

    <script>
        function transform() {
            const vals = [
                document.getElementById('t').value,
                document.getElementById('p').value,
                document.getElementById('l').value,
                document.getElementById('e').value
            ];
            const str = vals.join('');
            if(vals.some(v => !v)) return alert("配方不完整，無法重構物質！");

            const sphere = document.getElementById('eco-sphere');
            const root = document.documentElement;

            // 🧪 語意邏輯：非線性的變異反應
            
            // 1. 形狀變異 (Morphing)
            if(str.includes("水") || str.includes("海") || str.includes("跳")) {
                root.style.setProperty('--morph', "40% 60% 70% 30% / 50% 40% 60% 50%");
                root.style.setProperty('--blur', "15px");
            } else if(str.includes("冰") || str.includes("山") || str.includes("坐")) {
                root.style.setProperty('--morph', "5% 95% 5% 95% / 95% 5% 95% 5%");
                root.style.setProperty('--blur', "2px");
            } else {
                root.style.setProperty('--morph', "50% 50% 50% 50% / 50% 50% 50% 50%");
                root.style.setProperty('--blur', "10px");
            }

            // 2. 顏色與維度 (Color & Rotation)
            let hue = 0;
            if(str.includes("晚") || str.includes("夜")) hue = 240;
            else if(str.includes("午") || str.includes("日")) hue = 40;
            else if(str.includes("森") || str.includes("草")) hue = 100;
            else hue = Math.random() * 360;

            root.style.setProperty('--rotation', `${hue}deg`);
            root.style.setProperty('--primary', `hsl(${hue}, 100%, 70%)`);
            root.style.setProperty('--accent', `hsl(${hue}, 100%, 50%)`);

            // 3. AI 語意反饋
            document.getElementById('narrative').innerText = `【物態分析】：偵測到來自「${vals[2]}」的能量。${vals[1]}正在改變這裡的重力...`;
        }
    </script>
</body>
</html>
