<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>我的生活拍立得</title>
    <style>
        body { margin: 0; background: #f0f0f0; font-family: "MSung", "微軟正黑體", sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* 拍立得相框 */
        #photo-frame {
            width: 400px; height: 500px; background: white; margin-top: 50px;
            padding: 15px 15px 60px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; overflow: hidden; transform: rotate(-2deg);
            transition: all 0.5s ease;
        }

        /* 內容層疊 */
        #bg-layer { position: absolute; top: 15px; left: 15px; right: 15px; height: 380px; background: #e0e0e0; transition: 0.5s; background-size: cover; }
        #sprite-layer { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); font-size: 100px; transition: 0.5s; }
        #effect-layer { position: absolute; inset: 15px; pointer-events: none; display: flex; justify-content: center; align-items: center; font-size: 40px; }

        /* 輸入區 */
        .controls { margin-top: 40px; background: white; padding: 20px; border-radius: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .input-box { display: flex; flex-direction: column; }
        label { font-size: 12px; color: #888; margin-bottom: 5px; }
        input { border: 1px solid #ddd; padding: 10px; border-radius: 5px; font-size: 16px; }
        button { grid-column: span 2; padding: 15px; background: #ffcc00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        #caption { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 18px; color: #444; font-weight: bold; }
    </style>
</head>
<body>

    <div id="photo-frame">
        <div id="bg-layer"></div>
        <div id="sprite-layer">❓</div>
        <div id="effect-layer"></div>
        <div id="caption">點擊下方按鈕拍照</div>
    </div>

    <div class="controls">
        <div class="input-box"><label>1. 什麼時候</label><input type="text" id="t" placeholder="例如：早上"></div>
        <div class="input-box"><label>2. 誰</label><input type="text" id="p" placeholder="例如：小貓"></div>
        <div class="input-box"><label>3. 在哪裡</label><input type="text" id="l" placeholder="例如：在公園"></div>
        <div class="input-box"><label>4. 做什麼</label><input type="text" id="e" placeholder="例如：跑跳"></div>
        <button onclick="takePhoto()">📸 拍下一張生活照</button>
    </div>

    <script>
        function takePhoto() {
            const v = {
                t: document.getElementById('t').value,
                p: document.getElementById('p').value,
                l: document.getElementById('l').value,
                e: document.getElementById('e').value
            };

            const bg = document.getElementById('bg-layer');
            const sprite = document.getElementById('sprite-layer');
            const effect = document.getElementById('effect-layer');
            const frame = document.getElementById('photo-frame');

            // 1. 生活場景邏輯：根據「地點」換背景 (Emoji 模擬，可換成圖片)
            if (v.l.includes("公園")) bg.style.background = "#95afc0";
            else if (v.l.includes("海")) bg.style.background = "#70a1ff";
            else if (v.l.includes("廚房")) bg.style.background = "#f7d794";
            else bg.style.background = "#d1d8e0";

            // 2. 角色邏輯：根據「人物」換主角 (用 Emoji 讓一年級更有感)
            if (v.p.includes("貓")) sprite.innerText = "🐱";
            else if (v.p.includes("狗")) sprite.innerText = "🐶";
            else if (v.p.includes("妹") || v.p.includes("姐")) sprite.innerText = "👧";
            else if (v.p.includes("哥") || v.p.includes("弟")) sprite.innerText = "👦";
            else if (v.p.includes("媽")) sprite.innerText = "👩";
            else sprite.innerText = "👤";

            // 3. 事件邏輯：根據「動作」加特效
            if (v.e.includes("跑") || v.e.includes("跳")) effect.innerText = "💨 ✨";
            else if (v.e.includes("睡")) { effect.innerText = "💤"; sprite.style.transform = "translateX(-50%) rotate(90deg)"; }
            else if (v.e.includes("吃")) effect.innerText = "🍰 🍎";
            else effect.innerText = "";

            // 4. 時間邏輯：根據「時間」調亮度
            if (v.t.includes("晚") || v.t.includes("夜")) bg.style.filter = "brightness(0.4)";
            else bg.style.filter = "brightness(1)";

            // 5. 語意呈現
            document.getElementById('caption').innerText = `${v.t}的${v.p}在${v.l}${v.e}`;
            
            // 隨機搖動相框增加趣味
            frame.style.transform = `rotate(${(Math.random()-0.5)*10}deg) scale(1.05)`;
            setTimeout(() => frame.style.transform = `rotate(${(Math.random()-0.5)*5}deg)`, 300);
        }
    </script>
</body>
</html>
