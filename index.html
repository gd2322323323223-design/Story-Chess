<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>語意消除：四素連萌</title>
    <style>
        :root { --p-color: #38bdf8; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        
        #header { padding: 20px; text-align: center; }
        #game-grid { 
            display: grid; grid-template-columns: repeat(6, 70px); 
            grid-template-rows: repeat(6, 70px); gap: 8px; 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .tile { 
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.85rem; cursor: pointer; transition: 0.2s;
            user-select: none; position: relative;
        }
        .tile:hover { transform: scale(1.05); background: #334155; }
        .tile.selected { 
            background: var(--p-color); color: #000; font-weight: bold;
            box-shadow: 0 0 15px var(--p-color); transform: translateY(-5px);
        }

        /* 不同詞性的邊框顏色 */
        .type-T { border-bottom: 4px solid #f1c40f; } /* 時 */
        .type-P { border-bottom: 4px solid #e91e63; } /* 人 */
        .type-L { border-bottom: 4px solid #2ecc71; } /* 地 */
        .type-E { border-bottom: 4px solid #3498db; } /* 事 */

        #sentence-bar { 
            margin-top: 30px; width: 460px; height: 60px;
            background: rgba(0,0,0,0.4); border: 2px dashed #38bdf8;
            border-radius: 30px; display: flex; align-items: center;
            justify-content: center; font-size: 1.2rem; color: #38bdf8;
        }

        #pet-status { margin-top: 20px; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

<div id="header">
    <h2>語意消除實驗室</h2>
    <p>依序點擊：時 → 人 → 地 → 事，連結生命養分</p>
</div>

<div id="game-grid" id="grid"></div>

<div id="sentence-bar" id="current-sentence">請開始連結句子...</div>

<div id="pet-status">寵物正在觀察你的語法...</div>

<script>
    const grid = document.getElementById('game-grid');
    const sentenceBar = document.getElementById('current-sentence');
    const statusText = document.getElementById('pet-status');

    const wordBank = [
        { text: "清晨", type: "T" }, { text: "深夜", type: "T" }, { text: "中午", type: "T" },
        { text: "小狗", type: "P" }, { text: "媽媽", type: "P" }, { text: "老師", type: "P" },
        { text: "公園", type: "L" }, { text: "廚房", type: "L" }, { text: "課室", type: "L" },
        { text: "跑步", type: "E" }, { text: "煮麵", type: "E" }, { text: "看書", type: "E" }
    ];

    let selectedTiles = [];
    let gridData = []; // 儲存當前棋盤數據

    // 1. 初始化棋盤 (6x6)
    function initGrid() {
        grid.innerHTML = '';
        gridData = [];
        for (let i = 0; i < 36; i++) {
            const randomWord = wordBank[Math.floor(Math.random() * wordBank.length)];
            gridData.push({ ...randomWord, id: i });
        }
        renderGrid();
    }

    // 2. 渲染棋盤
    function renderGrid() {
        grid.innerHTML = '';
        gridData.forEach((data, index) => {
            const div = document.createElement('div');
            div.className = `tile type-${data.type}`;
            if (selectedTiles.includes(index)) div.classList.add('selected');
            div.innerText = data.text;
            div.onclick = () => handleTileClick(index);
            grid.appendChild(div);
        });
    }

    // 3. 點擊處理
    function handleTileClick(index) {
        const clickedTile = gridData[index];
        
        // 檢查是否重複點擊或已選滿
        if (selectedTiles.includes(index)) return;

        // 核心邏輯：必須按順序 T -> P -> L -> E (或者只要不重複類型即可)
        const currentTypes = selectedTiles.map(idx => gridData[idx].type);
        if (currentTypes.includes(clickedTile.type)) {
            statusText.innerText = "⚠️ 提示：一個句子只需要一個" + getTypeName(clickedTile.type);
            return;
        }

        selectedTiles.push(index);
        updateSentenceBar();

        // 當選滿 4 個
        if (selectedTiles.length === 4) {
            processElimination();
        } else {
            renderGrid();
        }
    }

    // 4. 消除與重力掉落
    function processElimination() {
        statusText.innerText = "✨ 語意達成！能量傳輸中...";
        
        // 延遲一點點讓玩家看到選中的樣子
        setTimeout(() => {
            // 消除選中的詞，用隨機新詞替換 (模擬掉落)
            selectedTiles.forEach(idx => {
                gridData[idx] = { ...wordBank[Math.floor(Math.random() * wordBank.length)], id: Math.random() };
            });

            selectedTiles = [];
            sentenceBar.innerText = "完美消除！繼續挑戰...";
            renderGrid();
        }, 600);
    }

    function updateSentenceBar() {
        const words = selectedTiles.map(idx => gridData[idx].text);
        sentenceBar.innerText = words.join(" → ");
        renderGrid();
    }

    function getTypeName(type) {
        return { "T": "時間", "P": "人物", "L": "地點", "E": "事件" }[type];
    }

    initGrid();
</script>
</body>
</html>
