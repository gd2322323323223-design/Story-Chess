<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>語意消除：四素連萌 (回饋增強版)</title>
    <style>
        :root { --t-color: #f1c40f; --p-color: #e91e63; --l-color: #2ecc71; --e-color: #3498db; }
        body { margin: 0; background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        
        #header { margin-bottom: 20px; text-align: center; }
        #game-grid { 
            display: grid; grid-template-columns: repeat(6, 75px); 
            grid-template-rows: repeat(6, 75px); gap: 10px; 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }

        .tile { 
            background: #1e293b; border: 2px solid #334155; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.9rem; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none; position: relative; color: #cbd5e1;
        }

        /* 選中狀態與序號提示 */
        .tile.selected { 
            transform: scale(1.1) translateY(-5px);
            color: #fff; border-color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .tile.selected::after {
            content: attr(data-order);
            position: absolute; top: -8px; right: -8px;
            width: 24px; height: 24px; background: white; color: black;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 根據類型上色 */
        .tile.T { border-bottom: 5px solid var(--t-color); }
        .tile.P { border-bottom: 5px solid var(--p-color); }
        .tile.L { border-bottom: 5px solid var(--l-color); }
        .tile.E { border-bottom: 5px solid var(--e-color); }

        .tile.selected.T { background: var(--t-color); color: #000; }
        .tile.selected.P { background: var(--p-color); color: #000; }
        .tile.selected.L { background: var(--l-color); color: #000; }
        .tile.selected.E { background: var(--e-color); color: #000; }

        #sentence-container { 
            margin-top: 40px; display: flex; gap: 10px; min-height: 50px; align-items: center;
        }
        .sentence-slot {
            width: 90px; height: 45px; border: 2px dashed #334155; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
            color: #475569; transition: 0.3s;
        }
        .sentence-slot.filled { border-style: solid; color: #fff; border-color: transparent; }

        #msg-box { margin-top: 20px; height: 20px; font-size: 0.9rem; color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <h2 style="margin:0; color:#38bdf8;">四素連萌：語意消除</h2>
    <p style="color:#64748b;">請依序集齊：時間、人物、地點、事件</p>
</div>

<div id="game-grid"></div>

<div id="sentence-container">
    <div class="sentence-slot" id="slot-T">時間</div>
    <div class="sentence-slot" id="slot-P">人物</div>
    <div class="sentence-slot" id="slot-L">地點</div>
    <div class="sentence-slot" id="slot-E">事件</div>
</div>

<div id="msg-box"></div>

<script>
    const grid = document.getElementById('game-grid');
    const msgBox = document.getElementById('msg-box');

    const wordBank = [
        { text: "清晨", type: "T" }, { text: "深夜", type: "T" }, { text: "中午", type: "T" }, { text: "放假", type: "T" },
        { text: "小狗", type: "P" }, { text: "媽媽", type: "P" }, { text: "老師", type: "P" }, { text: "爸爸", type: "P" },
        { text: "公園", type: "L" }, { text: "廚房", type: "L" }, { text: "課室", type: "L" }, { text: "海邊", type: "L" },
        { text: "跑步", type: "E" }, { text: "煮麵", type: "E" }, { text: "看書", type: "E" }, { text: "玩耍", type: "E" }
    ];

    let selectedTiles = []; // 存儲索引
    let gridData = [];

    function initGrid() {
        gridData = Array.from({length: 36}, () => wordBank[Math.floor(Math.random() * wordBank.length)]);
        render();
    }

    function render() {
        grid.innerHTML = '';
        gridData.forEach((data, index) => {
            const div = document.createElement('div');
            const selectIndex = selectedTiles.indexOf(index);
            div.className = `tile ${data.type}`;
            if (selectIndex !== -1) {
                div.classList.add('selected');
                div.setAttribute('data-order', selectIndex + 1);
            }
            div.innerText = data.text;
            div.onclick = () => handleClick(index);
            grid.appendChild(div);
        });

        // 更新下方語句槽
        ["T", "P", "L", "E"].forEach(type => {
            const slot = document.getElementById(`slot-${type}`);
            const foundIdx = selectedTiles.find(idx => gridData[idx].type === type);
            if (foundIdx !== undefined) {
                slot.innerText = gridData[foundIdx].text;
                slot.className = `sentence-slot filled`;
                slot.style.background = `var(--${type.toLowerCase()}-color)`;
            } else {
                slot.innerText = getTypeName(type);
                slot.className = `sentence-slot`;
                slot.style.background = 'transparent';
            }
        });
    }

    function handleClick(index) {
        const clickedWord = gridData[index];
        const isAlreadySelected = selectedTiles.includes(index);

        if (isAlreadySelected) {
            // 取消選擇
            selectedTiles = selectedTiles.filter(i => i !== index);
            msgBox.innerText = "";
        } else {
            // 檢查類型是否重複
            const hasType = selectedTiles.some(i => gridData[i].type === clickedWord.type);
            if (hasType) {
                msgBox.innerText = `⚠️ 你已經選過「${getTypeName(clickedWord.type)}」了喔！`;
                return;
            }
            if (selectedTiles.length >= 4) return;
            
            selectedTiles.push(index);
            msgBox.innerText = "";
        }

        if (selectedTiles.length === 4) {
            msgBox.innerText = "🎉 句子完整！消除中...";
            setTimeout(eliminate, 800);
        }
        render();
    }

    function eliminate() {
        selectedTiles.forEach(idx => {
            gridData[idx] = wordBank[Math.floor(Math.random() * wordBank.length)];
        });
        selectedTiles = [];
        msgBox.innerText = "✨ 幹得好！得到 1 份寵物飼料！";
        render();
    }

    function getTypeName(type) {
        return { "T": "時間", "P": "人物", "L": "地點", "E": "事件" }[type];
    }

    initGrid();
</script>
</body>
</html>
