<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>22 位學生神獸總覽儀表板</title>
  <link rel="stylesheet" href="style.css" />
  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"

</head>
<body>
  <button
    type="button"
    id="btn-teacher-mode"
    class="teacher-mode-btn"
    title="教師模式"
    aria-label="教師模式"

    <h1 class="dash-header__title">🎓 22 位學生神獸總覽儀表板</h1>

    </p>
  </header>

  <main id="dashboard-grid" class="dashboard-grid" aria-label="全班神獸插槽"></main>

  <script src="script.js"></script>
