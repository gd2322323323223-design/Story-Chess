<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>AI 語意生態缸 v2.0</title>
    <style>
        :root { --hue: 200; --glow: 20px; --speed: 10s; --saturation: 50%; }
        body { 
            margin: 0; background: #050508; color: #fff; 
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* 生態缸主體：利用 CSS Filter 模擬語意氛圍 */
        .container { margin-top: 5vh; position: relative; }
        
        #eco-sphere {
            width: 380px; height: 380px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                hsl(var(--hue), var(--saturation), 20%), 
                hsl(var(--hue), var(--saturation), 5%) 100%);
            border: 2px solid hsl(var(--hue), 100%, 70%);
            box-shadow: 0 0 var(--glow) hsl(var(--hue), 100%, 50%);
            position: relative; overflow: hidden;
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: contrast(1.1) brightness(1.1);
        }

        /* 模擬語意不穩定的抖動效果 */
        .unstable { animation: glitch 0.3s infinite; border-color: #ff4757 !important; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-5px, 5px); } 40% { transform: translate(-5px, -5px); } 60% { transform: translate(5px, 5px); } 80% { transform: translate(5px, -5px); } 100% { transform: translate(0); } }

        /* AI 生命體 */
        #creature {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: #fff; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            filter: blur(8px); opacity: 0.8; transition: all 1s;
            animation: pulse var(--speed) infinite ease-in-out;
        }

        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); border-radius: 30% 70%; } 50% { transform: translate(-50%, -50%) scale(1.5); border-radius: 50% 50%; } }

        /* 敘事面板 */
        #narrative-box {
            width: 450px; min-height: 80px; margin-top: 30px;
            padding: 20px; background: rgba(255,255,255,0.05);
            border-radius: 15px; border-left: 5px solid hsl(var(--hue), 100%, 50%);
            font-size: 1.1em; line-height: 1.6; color: #ddd;
        }

        /* 輸入控制台 */
        .ui-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 450px; margin-top: 20px;
        }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.8em; color: #666; margin-bottom: 4px; margin-left: 4px; }
        input { 
            background: #151520; border: 1px solid #333; padding: 12px; 
            color: #fff; border-radius: 8px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: hsl(var(--hue), 100%, 50%); background: #1a1a2a; }
        
        button {
            grid-column: span 2; margin-top: 10px; padding: 15px;
            background: hsl(var(--hue), 80%, 40%); border: none; border-radius: 8px;
            color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { filter: brightness(1.3); transform: translateY(-2px); }

    </style>
</head>
<body>

    <div class="container">
        <div id="eco-sphere">
            <div id="creature"></div>
        </div>
    </div>

    <div id="narrative-box">
        歡迎來到語意實驗室。請在下方注入要素，觀察世界如何成形。
    </div>

    <div class="ui-grid">
        <div class="input-group"><label>時間 (Time)</label><input type="text" id="t" placeholder="例如：深夜"></div>
        <div class="input-group"><label>人物 (Who)</label><input type="text" id="p" placeholder="例如：小機器人"></div>
        <div class="input-group"><label>地點 (Where)</label><input type="text" id="l" placeholder="例如：在月球上"></div>
        <div class="input-group"><label>事件 (Event)</label><input type="text" id="e" placeholder="例如：種花"></div>
        <button onclick="conductExperiment()">🔬 啟動語意實驗</button>
    </div>

    <script>
        function conductExperiment() {
            const vals = {
                t: document.getElementById('t').value,
                p: document.getElementById('p').value,
                l: document.getElementById('l').value,
                e: document.getElementById('e').value
            };

            const sphere = document.getElementById('eco-sphere');
            const box = document.getElementById('narrative-box');
            const creature = document.getElementById('creature');

            // 1. 結構完整性實驗：如果少了一個要素，世界會進入「不穩定」狀態
            if (!vals.t || !vals.p || !vals.l || !vals.e) {
                sphere.classList.add('unstable');
                box.innerText = "⚠️ 警告：語意結構支柱缺失，世界正在崩解。請補齊所有要素以維持穩定。";
                return;
            }
            sphere.classList.remove('unstable');

            // 2. 運用 AI 的「情感色彩映射」（模擬）
            // 我們定義不同詞彙對環境變量的影響
            let hue = 200; // 預設藍色
            let saturation = "50%";
            let glow = "20px";
            let speed = "10s";

            // 模擬語意分析邏輯
            const content = JSON.stringify(vals);
            
            if (content.includes("火") || content.includes("太陽") || content.includes("熱")) {
                hue = 15; // 暖色調
                saturation = "80%";
            } else if (content.includes("森") || content.includes("草") || content.includes("花")) {
                hue = 140; // 綠色
            } else if (content.includes("電") || content.includes("機器") || content.includes("太空")) {
                hue = 280; // 紫/科技色
            }

            if (content.includes("快") || content.includes("跑") || content.includes("跳")) {
                speed = "2s";
                glow = "60px";
            } else if (content.includes("靜") || content.includes("睡") || content.includes("慢")) {
                speed = "20s";
                glow = "5px";
            }

            // 3. 更新環境變量 (CSS Variables)
            document.documentElement.style.setProperty('--hue', hue);
            document.documentElement.style.setProperty('--saturation', saturation);
            document.documentElement.style.setProperty('--glow', glow);
            document.documentElement.style.setProperty('--speed', speed);

            // 4. AI 共同創作的敘事輸出
            // 這裡模擬 AI 根據你的詞彙生成的「場景擴寫」
            const expansions = [
                `這是一個充滿奇幻色彩的瞬間。在${vals.t}，${vals.p}${vals.l}正在${vals.e}。這讓周圍的能量變得非常${hue > 100 ? '平靜' : '熱烈'}。`,
                `觀察記錄：${vals.p}選擇在${vals.t}的時候，特地跑到了${vals.l}。看起來${vals.e}對這個世界的生態平衡至關重要。`,
                `新的語意生命誕生了！我們看到${vals.l}因為${vals.p}的${vals.e}，散發出了前所未有的${hue > 180 ? '神祕感' : '生命力'}。`
            ];
            
            box.style.opacity = 0;
            setTimeout(() => {
                box.innerText = expansions[Math.floor(Math.random() * expansions.length)];
                box.style.opacity = 1;
            }, 300);
        }
    </script>
</body>
</html>
