<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>語意棋盤：寵物幻境雛形</title>
    <style>
        :root { --p-color: #00f2fe; }
        body { margin: 0; background: #0a0a10; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #game-container { flex: 1; display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; }

        /* 左側：棋盤區 */
        #board { 
            background: rgba(255,255,255,0.05); border: 2px solid #333; 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(5, 1fr); gap: 5px; padding: 10px;
            border-radius: 15px; position: relative;
        }
        .cell { 
            background: rgba(0,0,0,0.3); border: 1px solid #222; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
            cursor: pointer; transition: 0.3s; color: #666;
        }
        .cell.active { background: var(--p-color); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--p-color); border: none; }

        /* 右側：寵物與顯示區 */
        #display-panel { 
            background: rgba(0,0,0,0.6); border-radius: 15px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; border: 1px solid #333;
        }
        #pet-canvas {
            width: 200px; height: 200px; background: var(--p-color); 
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(20px); box-shadow: 0 0 40px var(--p-color);
            margin-top: 40px; animation: morph 5s infinite alternate;
        }
        #story-box { margin-top: 40px; font-size: 1rem; line-height: 1.6; color: #ccc; text-align: center; }

        /* 底部：控制區 */
        #controls { 
            height: 180px; background: #000; border-top: 1px solid #333;
            padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .word-bank { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .word-chip { 
            padding: 8px 15px; background: #222; border: 1px solid var(--p-color); 
            border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem;
        }
        .word-chip:hover { background: var(--p-color); color: #000; }
        .type-label { font-size: 0.8rem; color: var(--p-color); font-weight: bold; margin-bottom: 5px; }

        @keyframes morph { 
            0% { border-radius: 40% 60% 70% 30%; transform: scale(1); }
            100% { border-radius: 60% 40% 30% 70%; transform: scale(1.1); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="board">
        </div>

    <div id="display-panel">
        <div id="status">寵物心情：穩定</div>
        <div id="pet-canvas"></div>
        <div id="story-box">請在棋盤上鋪設語意...</div>
        <button id="snap-btn" style="margin-top:auto; padding:10px 20px; display:none;">📸 存入探險相簿</button>
    </div>
</div>

<div id="controls">
    <div>
        <div class="type-label">選擇一個詞語放入棋盤：</div>
        <div class="word-bank" id="words">
            </div>
    </div>
</div>

<script>
    const board = document.getElementById('board');
    const wordsContainer = document.getElementById('words');
    const storyBox = document.getElementById('story-box');
    const root = document.documentElement;

    let currentSelectedWord = null;
    let boardState = Array(25).fill(null); // 紀錄棋盤狀態

    // 1. 增強版語義網：定義詞語之間的「強關聯」
    const semanticAssociations = {
        "媽媽": ["廚房", "做飯", "深夜"],
        "小狗": ["公園", "跑步", "清晨"],
        "清晨": ["公園", "跑步", "媽媽"],
        "深夜": ["廚房", "做飯", "小狗"],
        "公園": ["跑步", "小狗", "清晨"],
        "廚房": ["做飯", "媽媽", "深夜"]
    };

    const wordBank = [
        { text: "清晨", type: "T", color: "#f1c40f" },
        { text: "深夜", type: "T", color: "#34495e" },
        { text: "小狗", type: "P", color: "#e67e22" },
        { text: "媽媽", type: "P", color: "#e91e63" },
        { text: "公園", type: "L", color: "#2ecc71" },
        { text: "廚房", type: "L", color: "#d35400" },
        { text: "跑步", type: "E", color: "#3498db" },
        { text: "做飯", type: "E", color: "#9b59b6" }
    ];

    // 2. 初始化棋盤
    const cells = [];
    for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.innerText = "";
        cell.onclick = () => playerMove(i);
        board.appendChild(cell);
        cells.push(cell);
    }

    // 3. 玩家下棋
    function playerMove(index) {
        if (!currentSelectedWord || boardState[index]) return;

        placeWordOnBoard(index, currentSelectedWord, "player");
        
        // 玩家下完後，延遲 1 秒觸發 AI 動作
        storyBox.innerText = `AI 正在思考如何回應「${currentSelectedWord.text}」...`;
        setTimeout(() => aiMove(index), 1000);
        
        currentSelectedWord = null;
    }

    // 4. AI 自動對弈邏輯 (核心！)
    function aiMove(playerIndex) {
        const playerWord = boardState[playerIndex].text;
        const associations = semanticAssociations[playerWord];
        
        // AI 從關聯詞中選一個，並在玩家棋子周圍找空位
        const aiChoiceText = associations[Math.floor(Math.random() * associations.length)];
        const aiWord = wordBank.find(w => w.text === aiChoiceText);
        
        const neighborIndex = findEmptyNeighbor(playerIndex);
        
        if (neighborIndex !== null && aiWord) {
            placeWordOnBoard(neighborIndex, aiWord, "ai");
            storyBox.innerText = `AI 認為 ${playerWord} 與 ${aiWord.text} 有關，因此在旁邊鋪設了路徑！`;
            root.style.setProperty('--p-color', aiWord.color); // 寵物顏色隨 AI 改變
        } else {
            storyBox.innerText = `AI 在沈思中，尚未找到合適的語義連接。`;
        }
    }

    // 輔助功能：尋找鄰近的空位
    function findEmptyNeighbor(index) {
        const neighbors = [index-5, index+5, index-1, index+1].filter(i => i >= 0 && i < 25 && !boardState[i]);
        return neighbors.length > 0 ? neighbors[Math.floor(Math.random() * neighbors.length)] : null;
    }

    // 統一畫線/放置邏輯
    function placeWordOnBoard(index, word, owner) {
        boardState[index] = word;
        const cell = cells[index];
        cell.innerText = word.text;
        cell.className = `cell active ${owner}`;
        cell.style.background = word.color;
        if(owner === "ai") {
            cell.style.boxShadow = "0 0 20px white";
            cell.style.border = "2px solid white";
        }
    }

    // 初始化詞庫按鈕
    wordBank.forEach(w => {
        const chip = document.createElement('div');
        chip.className = 'word-chip';
        chip.innerText = w.text;
        chip.onclick = () => {
            currentSelectedWord = w;
            document.querySelectorAll('.word-chip').forEach(c => c.style.border = '1px solid #333');
            chip.style.border = `2px solid ${w.color}`;
        };
        wordsContainer.appendChild(chip);
    });

</script>
</body>
</html>
