<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>四素連萌：4x4 精準訓練版</title>
    <style>
        :root { --t-color: #f1c40f; --p-color: #e91e63; --l-color: #2ecc71; --e-color: #3498db; }
        body { margin: 0; background: #0f172a; color: white; font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        
        #game-grid { 
            display: grid; grid-template-columns: repeat(4, 85px); 
            grid-template-rows: repeat(4, 85px); gap: 12px; 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }

        .tile { 
            background: #1e293b; border: 2px solid #334155; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 1rem; cursor: pointer; transition: all 0.2s;
            user-select: none; position: relative; color: #cbd5e1; text-align: center;
        }

        .tile.selected { transform: scale(1.1); color: #fff; border-color: #fff; z-index: 10; }
        .tile.selected.T { background: var(--t-color); color: #000; }
        .tile.selected.P { background: var(--p-color); color: #000; }
        .tile.selected.L { background: var(--l-color); color: #000; }
        .tile.selected.E { background: var(--e-color); color: #000; }

        /* 類型提示線 */
        .tile.T { border-top: 4px solid var(--t-color); }
        .tile.P { border-top: 4px solid var(--p-color); }
        .tile.L { border-top: 4px solid var(--l-color); }
        .tile.E { border-top: 4px solid var(--e-color); }

        #sentence-container { margin-top: 30px; display: flex; gap: 10px; }
        .slot {
            width: 80px; height: 40px; border: 2px dashed #334155; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: #475569;
        }
        .slot.active { border-color: #fff; color: #fff; border-style: solid; font-weight: bold; }

        #hint-box { margin-top: 20px; height: 25px; color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

<div id="header" style="text-align: center; margin-bottom: 20px;">
    <h2 style="margin:0;">四素連萌 (4x4)</h2>
    <p style="color:#64748b; font-size: 0.9rem;">順序：時間 → 人物 → 地點 → 事情</p>
</div>

<div id="game-grid"></div>

<div id="sentence-container">
    <div class="slot" id="slot-0">時間</div>
    <div class="slot" id="slot-1">人物</div>
    <div class="slot" id="slot-2">地點</div>
    <div class="slot" id="slot-3">事情</div>
</div>

<div id="hint-box">請點選「時間」詞語開始</div>

<script>
    const grid = document.getElementById('game-grid');
    const hintBox = document.getElementById('hint-box');
    const typesOrder = ["T", "P", "L", "E"];
    const typeNames = ["時間", "人物", "地點", "事情"];

    const wordBank = {
        T: ["清晨", "中午", "放假", "深夜"],
        P: ["小狗", "媽媽", "老師", "弟弟"],
        L: ["公園", "廚房", "海邊", "課室"],
        E: ["跑步", "煮麵", "看書", "玩耍"]
    };

    let gridData = [];
    let selectedIndices = [];

    function initGame() {
        // 確保 4x4 棋盤每種元素各 4 個
        let pool = [];
        typesOrder.forEach(type => {
            wordBank[type].forEach(word => {
                pool.push({
                    text: type === "L" ? "在" + word : word,
                    type: type
                });
            });
        });
        
        // 隨機洗牌
        gridData = pool.sort(() => Math.random() - 0.5);
        selectedIndices = [];
        render();
    }

    function render() {
        grid.innerHTML = '';
        gridData.forEach((data, index) => {
            const div = document.createElement('div');
            div.className = `tile ${data.type}`;
            if (selectedIndices.includes(index)) div.classList.add('selected');
            div.innerText = data.text;
            div.onclick = () => handleClick(index);
            grid.appendChild(div);
        });

        // 更新下方槽位
        for(let i=0; i<4; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if (selectedIndices[i] !== undefined) {
                const data = gridData[selectedIndices[i]];
                slot.innerText = data.text;
                slot.className = `slot active`;
                slot.style.background = getComputedStyle(document.documentElement).getPropertyValue(`--${data.type.toLowerCase()}-color`);
            } else {
                slot.innerText = typeNames[i];
                slot.className = `slot`;
                slot.style.background = 'transparent';
            }
        }
    }

    function handleClick(index) {
        const clickedWord = gridData[index];
        const nextTypeNeeded = typesOrder[selectedIndices.length];

        // 1. 如果點擊已選中的（且是最後一個），則取消
        if (selectedIndices.includes(index)) {
            if (index === selectedIndices[selectedIndices.length - 1]) {
                selectedIndices.pop();
                updateHint();
                render();
            }
            return;
        }

        // 2. 嚴格順序校驗
        if (clickedWord.type !== nextTypeNeeded) {
            hintBox.innerText = `❌ 順序錯誤！現在需要選「${typeNames[selectedIndices.length]}」`;
            return;
        }

        // 3. 符合順序，加入序列
        selectedIndices.push(index);
        
        if (selectedIndices.length === 4) {
            hintBox.innerText = "🎉 成功組合！句子消除！";
            setTimeout(eliminate, 800);
        } else {
            updateHint();
        }
        render();
    }

    function updateHint() {
        hintBox.innerText = `請選擇「${typeNames[selectedIndices.length]}」詞語`;
    }

    function eliminate() {
        // 將選中的詞變為空白或新詞（這裡簡單處理為直接刷新棋盤位置以維持 4x4）
        // 實際遊戲中可以讓它們消失並掉落
        selectedIndices.sort((a,b) => b-a).forEach(idx => {
            gridData.splice(idx, 1);
        });
        
        selectedIndices = [];
        if (gridData.length === 0) {
            hintBox.innerText = "🏆 太棒了！你清空了所有詞語！";
            setTimeout(initGame, 2000);
        } else {
            updateHint();
        }
        render();
    }

    initGame();
</script>
</body>
</html>
